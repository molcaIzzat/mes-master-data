name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: app
    attributes:
      label: Target app
      options:
        - core-api
        - bff
        - web
        - repo-wide (CI / docker / tooling)
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, if any.
