name: api

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/api.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/api.yaml"
  workflow_dispatch:

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  APP: api
  IMAGE: ${{ vars.DOCKERHUB_NAMESPACE }}/template-api

jobs:
  install-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # Warms the pnpm-store cache (keyed on pnpm-lock.yaml by setup-node) so the
      # parallel check/test/build jobs install from cache.
      - run: pnpm install --frozen-lockfile

  check:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      # Build the @molca/* workspace deps first — type-aware check resolves their
      # types from each dep's built dist (gitignored, so absent on a fresh checkout).
      - run: pnpm --filter "${APP}^..." run build
      - run: pnpm --filter ${{ env.APP }} run check

  test:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm --filter "${APP}^..." run build
      - run: pnpm --filter ${{ env.APP }} run test

  build:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      # `${APP}...` builds the app AND its workspace deps in topological order.
      - run: pnpm --filter "${APP}..." run build

  release-image:
    needs: [check, test, build]
    # Build & push only on merges to main and manual runs — never on PRs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Requires repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN and the
      # repo variable DOCKERHUB_NAMESPACE. Until they exist this step fails — see README.
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
