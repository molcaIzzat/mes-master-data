# OpenTelemetry Collector — receives OTLP from bff + api, fans traces out
# to Jaeger and exposes metrics for Prometheus to scrape.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Traces -> Jaeger (all-in-one accepts OTLP on 4317).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Metrics -> exposed at :8889/metrics for Prometheus to scrape.
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
