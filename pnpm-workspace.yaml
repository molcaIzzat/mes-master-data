packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^7.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
  "@hono/vite-build": ^1.11.1
  "@hono/vite-dev-server": ^0.26.0
  dotenv: ^17.4.2
  openid-client: ^6.8.4
  jose: ^6.2.3
  awilix: ^13.0.5
  zod: ^4.4.3
  "@hono/zod-validator": ^0.8.0
  axios: ^1.18.0
  "@tanstack/react-query": ^5.101.0
  tailwindcss: ^4.3.1
  "@tailwindcss/vite": ^4.3.1
  loglayer: ^9.3.0
  "@loglayer/transport-pino": ^3.2.0
  "@loglayer/plugin-opentelemetry": ^3.2.0
  pino: ^10.3.1
  pino-pretty: ^13.1.3
  "@opentelemetry/api": ^1.9.1
  "@opentelemetry/sdk-node": ^0.219.0
  "@opentelemetry/sdk-metrics": ^2.8.0
  "@opentelemetry/exporter-trace-otlp-proto": ^0.219.0
  "@opentelemetry/exporter-metrics-otlp-proto": ^0.219.0
  "@opentelemetry/instrumentation-http": ^0.219.0
  "@opentelemetry/instrumentation-undici": ^0.29.0
  "@opentelemetry/instrumentation-pg": ^0.71.0
  "@hono/otel": ^1.1.2
  "@tanstack/react-router": ^1.170.18
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  lucide-react: ^1.25.0
  "@radix-ui/react-slot": ^1.3.0
  tw-animate-css: ^1.4.0
  radix-ui: ^1.6.5
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
minimumReleaseAgeExclude:
  - hono@4.12.26
allowBuilds:
  esbuild: true
  protobufjs: true
